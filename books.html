<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books</title>

<style>

:root {
    --bg-color: #f0f0f0;
    --text-color: #333;
    --secondary-text-color: #666;
    --button-bg: #ddd;
    --button-text: #333;
}

.dark-mode {
    --bg-color: #121212;
    --text-color: #fff;
    --secondary-text-color: #bbb;
    --button-bg: #444;
    --button-text: #fff;
}

body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px;
    background-color: var(--bg-color);
    color: var(--text-color);
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

/* top buttons */

.button-container {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
}

.home-button {
    background-color: var(--button-bg);
    color: var(--button-text);
    border: none;
    padding: 8px 15px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

.home-button:hover {
    background-color: #bbb;
}

.dark-mode .home-button:hover {
    background-color: #666;
}

.toggle-button {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
}

/* bookshelf layout */

.bookshelf {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 30px;
    max-width: 1000px;
    margin: auto;
}

/* book card */

.book {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.book img {
    width: 120px;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.25);
    transition: transform 0.2s;
}

.book img:hover {
    transform: scale(1.05);
}

.book p {
    font-size: 14px;
    margin-top: 10px;
    color: var(--secondary-text-color);
}

</style>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const toggleButton = document.getElementById("toggle-mode");
    const body = document.body;

    function updateIcon() {
        toggleButton.textContent =
        body.classList.contains("dark-mode") ? "☀️" : "🌙";
    }

    if (localStorage.getItem("darkMode") === "enabled") {
        body.classList.add("dark-mode");
    }

    updateIcon();

    toggleButton.addEventListener("click", function() {
        body.classList.toggle("dark-mode");

        if (body.classList.contains("dark-mode")) {
            localStorage.setItem("darkMode","enabled");
        } else {
            localStorage.setItem("darkMode","disabled");
        }

        updateIcon();
    });

});
</script>

</head>

<body>

<div class="button-container">
<a href="index.html">
<button class="home-button">Home</button>
</a>
<button id="toggle-mode" class="toggle-button">🌙</button>
</div>

<h1>Books Collection</h1>

<div class="bookshelf">

<div class="book">
<img src="https://covers.openlibrary.org/b/isbn/9781328662057-L.jpg">
<p>Maybe You Should Talk to Someone</p>
</div>

<div class="book">
<img src="https://covers.openlibrary.org/b/isbn/9798400900075-L.jpg">
<p>Omniscient Reader's Viewpoint</p>
</div>

<div class="book">
<img src="https://covers.openlibrary.org/b/isbn/9780749743857-L.jpg">
<p>Alex Rider: Eagle Strike</p>
</div>

</div>

</body>
</html>
